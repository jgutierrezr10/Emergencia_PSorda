<div class="login-container">
  <div class="login-card">
    
    <div class="login-header">
      <div class="logo-shield">
        <!-- SVG Ficticio de Escudo simple tipo Carabineros -->
        <svg xmlns="http://www.w3.org/2001/svg" viewBox="0 0 24 24" fill="currentColor">
          <path fill-rule="evenodd" d="M12.516 2.17a.75.75 0 00-1.032 0 11.209 11.209 0 01-7.877 3.08.75.75 0 00-.722.515A12.74 12.74 0 002.25 9.75c0 5.942 4.064 10.933 9.563 12.348a.749.749 0 00.374 0c5.499-1.415 9.563-6.406 9.563-12.348 0-1.39-.223-2.73-.635-3.985a.75.75 0 00-.722-.516l-.143.001c-2.996 0-5.717-1.17-7.734-3.08z" clip-rule="evenodd" />
        </svg>
      </div>
      <h2>PANEL OPERADOR CENCO</h2>
      <p>Central de Operaciones - Carabineros de Chile</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      
      <div class="form-group">
        <label for="rut">RUT</label>
        <input 
          type="text" 
          id="rut" 
          formControlName="rut" 
          placeholder="12.345.678-9" 
          [class.has-error]="loginForm.get('rut')?.invalid && loginForm.get('rut')?.touched"
        />
        <div class="error-msg" *ngIf="loginForm.get('rut')?.invalid && loginForm.get('rut')?.touched">
          El RUT es obligatorio.
        </div>
      </div>

      <div class="form-group">
        <label for="clave">CONTRASEÑA</label>
        <input 
          type="password" 
          id="clave" 
          formControlName="clave" 
          placeholder="••••••••" 
          [class.has-error]="loginForm.get('clave')?.invalid && loginForm.get('clave')?.touched"
        />
        <div class="error-msg" *ngIf="loginForm.get('clave')?.invalid && loginForm.get('clave')?.touched">
          La contraseña es obligatoria.
        </div>
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">INGRESAR AL SISTEMA</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <div class="login-footer">
        <hr class="separator" />
        <p>Acceso exclusivo personal autorizado</p>
      </div>

    </form>
  </div>
</div>
