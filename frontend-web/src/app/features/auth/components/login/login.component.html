<div class="login-container">
  <div class="login-card">
    
    <div class="login-header">
      <div class="logo-shield" style="background: transparent;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Roundel_of_Carabineros_de_Chile.svg/1920px-Roundel_of_Carabineros_de_Chile.svg.png" alt="Logo Carabineros" style="width: 80px; height: 80px; object-fit: contain;" />
      </div>
      <h2>PANEL OPERADOR CENCO</h2>
      <p>Central de Operaciones - Carabineros de Chile</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      
      <div class="form-group">
        <label for="rut">RUT</label>
        <input 
          type="text" 
          id="rut" 
          formControlName="rut" 
          placeholder="12.345.678-9" 
          [class.has-error]="loginForm.get('rut')?.invalid && loginForm.get('rut')?.touched"
        />
        <div class="error-msg" *ngIf="loginForm.get('rut')?.invalid && loginForm.get('rut')?.touched">
          El RUT es obligatorio.
        </div>
      </div>

      <div class="form-group">
        <label for="clave">CLAVE ÚNICA</label>
        <input 
          type="password" 
          id="clave" 
          formControlName="clave" 
          placeholder="••••••••" 
          [class.has-error]="loginForm.get('clave')?.invalid && loginForm.get('clave')?.touched"
        />
        <div class="error-msg" *ngIf="loginForm.get('clave')?.invalid && loginForm.get('clave')?.touched">
          La clave única es obligatoria.
        </div>
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">INGRESAR AL SISTEMA</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <div class="login-footer">
        <hr class="separator" />
        <p>Acceso exclusivo personal autorizado</p>
      </div>

    </form>
  </div>
</div>
