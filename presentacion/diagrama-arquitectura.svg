<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="Lexend, 'Segoe UI', sans-serif">
  <defs>
    <marker id="af" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#059669"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#d97706"/></marker>
    <marker id="ap" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#7c3aed"/></marker>
  </defs>

  <rect width="1280" height="800" fill="#f8fafc"/>
  <text x="640" y="46" text-anchor="middle" font-size="28" font-weight="800" fill="#064e3b">Arquitectura — App Emergencia Gente Sorda</text>
  <text x="640" y="72" text-anchor="middle" font-size="15" fill="#475569">3 componentes independientes · un solo cerebro central · el canal correcto para cada necesidad</text>

  <!-- ===== APP MOVIL ===== -->
  <rect x="60" y="110" width="330" height="270" rx="16" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
  <text x="225" y="145" text-anchor="middle" font-size="19" font-weight="800" fill="#065f46">📱 APP MÓVIL</text>
  <text x="225" y="168" text-anchor="middle" font-size="14" fill="#047857">Persona sorda (ciudadano)</text>
  <rect x="85" y="185" width="280" height="30" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="225" y="205" text-anchor="middle" font-size="13" fill="#334155">React Native + Expo (Android / iOS)</text>
  <rect x="85" y="222" width="280" height="30" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="225" y="242" text-anchor="middle" font-size="13" fill="#334155">UI en glosa LSCh · botón de emergencia · triage</text>
  <rect x="85" y="259" width="280" height="30" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="225" y="279" text-anchor="middle" font-size="13" fill="#334155">Mapa Leaflet (WebView) · GPS expo-location</text>
  <rect x="85" y="296" width="280" height="30" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="225" y="316" text-anchor="middle" font-size="13" fill="#334155">Videollamada WebRTC (WebView) · chat</text>
  <rect x="85" y="338" width="280" height="26" rx="13" fill="#059669"/>
  <text x="225" y="356" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Distribución: Expo / EAS Update</text>

  <!-- ===== PANEL CENCO ===== -->
  <rect x="890" y="110" width="330" height="270" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="1055" y="145" text-anchor="middle" font-size="19" font-weight="800" fill="#1e3a8a">🖥️ PANEL WEB CENCO</text>
  <text x="1055" y="168" text-anchor="middle" font-size="14" fill="#1d4ed8">Operador de Carabineros</text>
  <rect x="915" y="185" width="280" height="30" rx="6" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="1055" y="205" text-anchor="middle" font-size="13" fill="#334155">Angular 21 (navegador, sin instalación)</text>
  <rect x="915" y="222" width="280" height="30" rx="6" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="1055" y="242" text-anchor="middle" font-size="13" fill="#334155">Mapa Leaflet · despacho de patrulla · ETA</text>
  <rect x="915" y="259" width="280" height="30" rx="6" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="1055" y="279" text-anchor="middle" font-size="13" fill="#334155">Chat · videollamada · notas del operador</text>
  <rect x="915" y="296" width="280" height="30" rx="6" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="1055" y="316" text-anchor="middle" font-size="13" fill="#334155">Historial de casos · informe PDF (jsPDF)</text>
  <rect x="915" y="338" width="280" height="26" rx="13" fill="#2563eb"/>
  <text x="1055" y="356" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Publicado en Vercel</text>

  <!-- ===== BACKEND ===== -->
  <rect x="400" y="430" width="480" height="250" rx="16" fill="#fefce8" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="640" y="465" text-anchor="middle" font-size="19" font-weight="800" fill="#713f12">⚙️ BACKEND — el cerebro</text>
  <text x="640" y="487" text-anchor="middle" font-size="14" fill="#a16207">Spring Boot 4 · Java 17</text>
  <rect x="425" y="502" width="200" height="34" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="525" y="524" text-anchor="middle" font-size="13" fill="#334155">Controllers (API REST)</text>
  <rect x="425" y="543" width="200" height="34" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="525" y="565" text-anchor="middle" font-size="13" fill="#334155">Services (lógica de negocio)</text>
  <rect x="425" y="584" width="200" height="34" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="525" y="606" text-anchor="middle" font-size="13" fill="#334155">Repositories (JPA / Hibernate)</text>
  <rect x="655" y="502" width="200" height="34" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="755" y="524" text-anchor="middle" font-size="13" fill="#334155">Seguridad JWT + BCrypt</text>
  <rect x="655" y="543" width="200" height="34" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="755" y="565" text-anchor="middle" font-size="13" fill="#334155">Broker STOMP (/ws-chat)</text>
  <rect x="655" y="584" width="200" height="34" rx="6" fill="#0f766e"/>
  <text x="755" y="606" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">🗄️ PostgreSQL</text>
  <rect x="425" y="632" width="430" height="26" rx="13" fill="#ca8a04"/>
  <text x="640" y="650" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Desplegado en Railway (servidor + base de datos)</text>

  <!-- ===== ENTIDADES ===== -->
  <rect x="60" y="470" width="280" height="170" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="200" y="498" text-anchor="middle" font-size="15" font-weight="800" fill="#334155">Modelo de datos (núcleo)</text>
  <text x="200" y="524" text-anchor="middle" font-size="13" fill="#475569">Usuario → PersonaSorda / Carabinero</text>
  <text x="200" y="548" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">ALERTA (centro del modelo)</text>
  <text x="200" y="572" text-anchor="middle" font-size="13" fill="#475569">↳ Triage · Chat · Notas operador</text>
  <text x="200" y="596" text-anchor="middle" font-size="13" fill="#475569">↳ Despacho → Patrulla</text>
  <text x="200" y="620" text-anchor="middle" font-size="12" fill="#64748b">Todo el caso queda registrado → PDF</text>
  <line x1="340" y1="555" x2="400" y2="565" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- ===== SERVICIOS EXTERNOS ===== -->
  <rect x="940" y="470" width="280" height="170" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="1080" y="498" text-anchor="middle" font-size="15" font-weight="800" fill="#334155">Servicios externos (gratuitos)</text>
  <text x="1080" y="524" text-anchor="middle" font-size="13" fill="#475569">🗺️ OpenStreetMap + Leaflet (mapas)</text>
  <text x="1080" y="548" text-anchor="middle" font-size="13" fill="#475569">🛣️ OSRM (ruta de la patrulla por calles)</text>
  <text x="1080" y="572" text-anchor="middle" font-size="13" fill="#475569">📍 Nominatim (coordenadas → dirección)</text>
  <text x="1080" y="596" text-anchor="middle" font-size="13" fill="#475569">🔀 STUN / TURN (conexión del video)</text>
  <text x="1080" y="620" text-anchor="middle" font-size="12" fill="#64748b">Costo de operación: $0</text>

  <!-- ===== FLECHAS REST (verde) ===== -->
  <path d="M 225 380 C 225 430, 380 470, 398 490" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#af)"/>
  <path d="M 410 480 C 360 450, 250 420, 232 382" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#af)"/>
  <text x="255" y="428" font-size="13.5" font-weight="700" fill="#047857">REST / HTTPS + JWT</text>
  <text x="255" y="446" font-size="12.5" fill="#047857">alerta + GPS · estado (polling 2-3 s)</text>

  <path d="M 1055 380 C 1055 430, 900 470, 882 490" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#af)"/>
  <path d="M 870 480 C 920 450, 1030 420, 1048 382" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#af)"/>
  <text x="855" y="428" text-anchor="end" font-size="13.5" font-weight="700" fill="#047857">REST / HTTPS + JWT</text>
  <text x="855" y="446" text-anchor="end" font-size="12.5" fill="#047857">casos (polling) · despacho · notas</text>

  <!-- ===== FLECHAS WEBSOCKET (naranja) ===== -->
  <path d="M 390 330 C 480 380, 540 410, 590 428" fill="none" stroke="#d97706" stroke-width="3" stroke-dasharray="8 5" marker-end="url(#ao)"/>
  <path d="M 890 330 C 800 380, 740 410, 690 428" fill="none" stroke="#d97706" stroke-width="3" stroke-dasharray="8 5" marker-end="url(#ao)"/>
  <text x="640" y="398" text-anchor="middle" font-size="13.5" font-weight="700" fill="#b45309">WebSocket / STOMP (tiempo real)</text>
  <text x="640" y="416" text-anchor="middle" font-size="12.5" fill="#b45309">chat · timbre de llamada · señalización WebRTC</text>

  <!-- ===== FLECHA WEBRTC P2P (morada) ===== -->
  <path d="M 390 210 C 560 160, 720 160, 888 210" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#ap)"/>
  <path d="M 888 225 C 720 175, 560 175, 392 224" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#ap)"/>
  <text x="640" y="150" text-anchor="middle" font-size="14.5" font-weight="800" fill="#6d28d9">🎥 VIDEOLLAMADA — WebRTC de par a par</text>
  <text x="640" y="170" text-anchor="middle" font-size="12.5" fill="#6d28d9">el video viaja DIRECTO entre ambos, cifrado, sin pasar por el servidor</text>

  <!-- ===== LEYENDA ===== -->
  <rect x="60" y="700" width="1160" height="70" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <line x1="90" y1="735" x2="150" y2="735" stroke="#059669" stroke-width="3" marker-end="url(#af)"/>
  <text x="160" y="740" font-size="13" fill="#334155">REST/HTTPS: registrar y consultar (polling 2-3 s)</text>
  <line x1="520" y1="735" x2="580" y2="735" stroke="#d97706" stroke-width="3" stroke-dasharray="8 5" marker-end="url(#ao)"/>
  <text x="590" y="740" font-size="13" fill="#334155">WebSocket: avisos instantáneos</text>
  <line x1="860" y1="735" x2="920" y2="735" stroke="#7c3aed" stroke-width="4" marker-end="url(#ap)"/>
  <text x="930" y="740" font-size="13" fill="#334155">WebRTC: video directo entre personas</text>
</svg>
